services:
  postgres_db:
    image: postgres:16-alpine
    container_name: swarmio_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    networks:
      - swarmio_backend

  redis_cache:
    image: redis:7-alpine
    container_name: swarmio_redis_prod
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    networks:
      - swarmio_backend

  gateway_router:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
      restart_policy:
        condition: on-failure
    env_file:
      - .env
    networks:
      - swarmio_backend
    depends_on:
      - redis_cache
      - postgres_db

  text_worker:
    build:
      context: .
      dockerfile: Dockerfile.text
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    networks:
      - swarmio_backend

  math_worker:
    build:
      context: .
      dockerfile: Dockerfile.math
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    networks:
      - swarmio_backend

  nginx_load_balancer:
    image: nginx:alpine
    container_name: swarmio_nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway_router
    networks:
      - swarmio_backend

  # --- THE NEW FRONTEND BLOCK ---
  frontend_dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: swarmio_frontend
    ports:
      - "3000:80"
    depends_on:
      - nginx_load_balancer
    networks:
      - swarmio_backend

volumes:
  pgdata:

networks:
  swarmio_backend:
    driver: bridge
