worker_processes auto;
events {
    worker_connections 10240; # Optimized for massive parallel socket allocation
}

http {
    upstream gateway_cluster {
        # References the internal Docker Compose service name
        server gateway_router:8000;
    }

    server {
        listen 80;

        # Timeouts to drop dead or slow malicious client connections instantly
        client_body_timeout 10s;
        client_header_timeout 10s;
        keepalive_timeout 15s;
        send_timeout 10s;

        location / {
            proxy_pass http://gateway_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable HTTP/1.1 for keep-alive connections to microservices
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}